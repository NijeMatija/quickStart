<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 190" width="820" height="190"
     font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="wordmark" x1="150" x2="670" y1="42" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="accent" x1="255" x2="565" y1="134" y2="134" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#14b8a6"/>
      <stop offset="0.5" stop-color="#a7f3d0"/>
      <stop offset="0.82" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="2.5" flood-color="#0f172a" flood-opacity="0.35"/>
    </filter>
    <style><![CDATA[
      .word { fill: url(#wordmark); filter: url(#softShadow); }
      .subtle { fill: #475569; }
      .line { stroke: url(#accent); stroke-width: 2; stroke-linecap: round; }
      .dot { fill: #fb923c; }

      @media (prefers-color-scheme: dark) {
        .subtle { fill: #a7f3d0; }
        .dot { fill: #fb923c; }
      }
    ]]></style>
  </defs>

  <text x="410" y="94" text-anchor="middle" class="word"
        font-size="78" font-weight="900" letter-spacing="1.5">quickStart</text>

  <line x1="250" y1="128" x2="570" y2="128" class="line"/>

  <circle cx="296" cy="128" r="3.5" class="dot"/>
  <circle cx="524" cy="128" r="3.5" class="dot"/>

  <text x="410" y="142" text-anchor="middle" class="subtle"
        font-size="17" font-weight="800" letter-spacing="7">AI SPEC WIZARD</text>
</svg>
